name: Build HarmonyOS HAP

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

# Cancel previous runs on the same branch/tag
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for creating GitHub Releases

env:
  # ohos-node release version
  OHOS_NODE_VERSION: v24.2.0
  # electerm-web source
  ELECTERM_WEB_REPO: electerm/electerm-web
  ELECTERM_WEB_REF: main

jobs:
  build:
    # NOTE: HarmonyOS Command Line Tools are x64-only (commandline-tools-linux-x64)
    # Using ubuntu-latest (x64) is required. ARM64 runners (ubuntu-24.04-arm) won't work.
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout electerm-harmony
        uses: actions/checkout@v4

      # ── Setup Node.js (for building electerm-web) ────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '.cache/electerm-web/package-lock.json'

      # ── Install system deps for native modules ────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            unzip \
            jq \
            python3 \
            make \
            g++ \
            libsecret-1-dev

      # ── Step 1: Download ohos-node ───────────────────────────────────────
      - name: Prepare ohos-node
        run: ./scripts/prepare-node.sh
        env:
          OHOS_NODE_VERSION: ${{ env.OHOS_NODE_VERSION }}

      # ── Step 2: Clone & build electerm-web ───────────────────────────────
      - name: Prepare electerm-web
        run: ./scripts/prepare-web.sh
        env:
          ELECTERM_WEB_REPO: ${{ env.ELECTERM_WEB_REPO }}
          ELECTERM_WEB_REF: ${{ env.ELECTERM_WEB_REF }}
          OHOS_SERVER_SECRET: ${{ secrets.OHOS_SERVER_SECRET }}

      # ── Step 3: Download & setup HarmonyOS Command Line Tools ────────────
      - name: Download HarmonyOS Command Line Tools
        run: |
          if [ -z "${{ secrets.OHOS_CMDLINE_TOOLS_URL }}" ]; then
            echo "::error::OHOS_CMDLINE_TOOLS_URL secret is not set."
            echo "See build/ENV_SETUP.md for instructions."
            exit 1
          fi
          mkdir -p .cache
          curl -L --fail \
            -o .cache/commandline-tools.zip \
            "${{ secrets.OHOS_CMDLINE_TOOLS_URL }}"
          echo "Downloaded command line tools."

      - name: Extract HarmonyOS Command Line Tools
        run: |
          mkdir -p .cache/commandline-tools
          unzip -q .cache/commandline-tools.zip -d .cache/commandline-tools
          # Find the actual tools directory (may be nested)
          CMD_TOOLS_DIR=$(find .cache/commandline-tools -name "ohpm" -type f -exec dirname {} \; | head -1 | xargs dirname)
          echo "COMMANDLINE_TOOLS=${CMD_TOOLS_DIR}" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=${CMD_TOOLS_DIR}/sdk" >> $GITHUB_ENV
          echo "PATH=${CMD_TOOLS_DIR}/bin:${CMD_TOOLS_DIR}/hvigor/bin:${PATH}" >> $GITHUB_ENV
          echo "Found Command Line Tools at: ${CMD_TOOLS_DIR}"

      - name: Configure ohpm registry
        run: |
          # Use default registry; switch to mirror if in China
          # ohpm config set registry https://ohpm.openharmony.cn/ohpm/
          ohpm --version || true

      # ── Step 4: Decode signing materials ────────────────────────────────
      - name: Decode signing materials
        run: |
          mkdir -p signing
          echo "${{ secrets.OHOS_KEYSTORE_B64 }}" | base64 -d > signing/electerm.p12
          echo "${{ secrets.OHOS_CERT_B64 }}" | base64 -d > signing/electerm_publish.cer
          echo "${{ secrets.OHOS_PROFILE_B64 }}" | base64 -d > signing/electermRelease.p7b

          # Verify files
          for f in signing/electerm.p12 signing/electerm_publish.cer signing/electermRelease.p7b; do
            if [ ! -s "${f}" ]; then
              echo "::error::Failed to decode ${f} — check GitHub Secrets."
              exit 1
            fi
            echo "  ✓ $(basename ${f}): $(du -h ${f} | cut -f1)"
          done

      # ── Step 5: Set bundle name from secret ──────────────────────────────
      - name: Configure bundle name
        env:
          BUNDLE_NAME: ${{ secrets.OHOS_BUNDLE_NAME }}
        run: |
          if [ -n "${BUNDLE_NAME}" ]; then
            sed -i "s/\"bundleName\": \".*\"/\"bundleName\": \"${BUNDLE_NAME}\"/" \
              AppScope/app.json5
            echo "Bundle name set to: ${BUNDLE_NAME}"
          else
            echo "Using default bundle name from app.json5"
          fi
          cat AppScope/app.json5

      # ── Step 6: Build & sign the HAP ─────────────────────────────────────
      - name: Build HarmonyOS app
        run: ./scripts/build-app.sh --${{ github.event.inputs.build_mode || 'release' }}
        env:
          COMMANDLINE_TOOLS: ${{ env.COMMANDLINE_TOOLS }}
          OHOS_SDK_HOME: ${{ env.OHOS_SDK_HOME }}
          KEYSTORE_PASSWORD: ${{ secrets.OHOS_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.OHOS_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.OHOS_KEY_ALIAS }}

      # ── Step 7: Upload artifact ──────────────────────────────────────────
      - name: Find HAP file
        id: find_hap
        run: |
          HAP_FILE=$(find entry/build -name "*.hap" -type f | head -1)
          if [ -z "${HAP_FILE}" ]; then
            echo "::error::No .hap file found!"
            exit 1
          fi
          echo "hap_path=${HAP_FILE}" >> $GITHUB_OUTPUT
          echo "hap_name=$(basename ${HAP_FILE})" >> $GITHUB_OUTPUT
          echo "Found HAP: ${HAP_FILE} ($(du -h ${HAP_FILE} | cut -f1))"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: electerm-harmony-${{ github.sha }}
          path: ${{ steps.find_hap.outputs.hap_path }}
          retention-days: 30

      # ── Step 8: Create GitHub Release (on tag push) ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_hap.outputs.hap_path }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ohos-node | \`${{ env.OHOS_NODE_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| electerm-web | \`${{ env.ELECTERM_WEB_REPO }}@${{ env.ELECTERM_WEB_REF }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build mode | \`${{ github.event.inputs.build_mode || 'release' }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.find_hap.outputs.hap_path }}" ]; then
            echo "| HAP file | \`${{ steps.find_hap.outputs.hap_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| HAP size | \`$(du -h ${{ steps.find_hap.outputs.hap_path }} | cut -f1)\` |" >> $GITHUB_STEP_SUMMARY
          fi
