name: Build HarmonyOS HAP

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

# Cancel previous runs on the same branch/tag
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # ohos-node release version
  OHOS_NODE_VERSION: v24.2.0
  # electerm-web source
  ELECTERM_WEB_REPO: electerm/electerm-web
  ELECTERM_WEB_REF: main

jobs:
  build:
    # NOTE: HarmonyOS Command Line Tools are x64-only (commandline-tools-linux-x64)
    # Using ubuntu-latest (x64) is required. ARM64 runners (ubuntu-24.04-arm) won't work.
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout electerm-harmony
        uses: actions/checkout@v4

      # ── Setup Node.js (for building electerm-web) ────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Install system deps for native modules ────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            unzip \
            jq \
            python3 \
            make \
            g++ \
            libsecret-1-dev

      # ── Step 1: Download ohos-node ───────────────────────────────────────
      - name: Prepare ohos-node
        run: ./scripts/prepare-node.sh
        env:
          OHOS_NODE_VERSION: ${{ env.OHOS_NODE_VERSION }}

      # ── Step 2: Clone & build electerm-web ───────────────────────────────
      - name: Prepare electerm-web
        run: ./scripts/prepare-web.sh
        env:
          ELECTERM_WEB_REPO: ${{ env.ELECTERM_WEB_REPO }}
          ELECTERM_WEB_REF: ${{ env.ELECTERM_WEB_REF }}
          OHOS_SERVER_SECRET: ${{ secrets.OHOS_SERVER_SECRET }}

      # ── Step 3: Download & extract REAL HarmonyOS Command Line Tools ──────
      - name: Download & extract HarmonyOS Command Line Tools
        env:
          OHOS_CMDLINE_TOOLS_URL: ${{ secrets.OHOS_CMDLINE_TOOLS_URL }}
        run: |
          set -euo pipefail
          if [ -z "${OHOS_CMDLINE_TOOLS_URL}" ]; then
            echo "::error::OHOS_CMDLINE_TOOLS_URL secret is not set."
            exit 1
          fi
          mkdir -p .cache
          ZIP=".cache/commandline-tools.zip"
          echo "Downloading HarmonyOS Command Line Tools (~2 GB) from secret URL ..."
          # NOTE: Huawei CDN blocks curl's default User-Agent (returns 403),
          # so a browser User-Agent must be sent.
          curl -L --retry 10 --retry-all-errors --retry-delay 5 -C - \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36" \
            -o "$ZIP" "${OHOS_CMDLINE_TOOLS_URL}"
          echo "Verifying archive integrity ..."
          if ! unzip -t "$ZIP" >/dev/null 2>&1; then
            echo "::error::Downloaded archive is corrupt; retrying once without resume."
            curl -L --retry 10 --retry-all-errors --retry-delay 5 \
              -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36" \
              -o "$ZIP" "${OHOS_CMDLINE_TOOLS_URL}"
            unzip -t "$ZIP" >/dev/null 2>&1 || { echo "::error::Still corrupt after retry"; exit 1; }
          fi
          rm -rf .cache/commandline-tools
          mkdir -p .cache/commandline-tools
          # -o: overwrite without prompting (the official zip contains duplicate path entries)
          unzip -o -q "$ZIP" -d .cache/commandline-tools
          COMMANDLINE_TOOLS="$(pwd)/.cache/commandline-tools/command-line-tools"
          if [ ! -d "$COMMANDLINE_TOOLS" ]; then
            COMMANDLINE_TOOLS="$(cd "$(dirname "$(find .cache/commandline-tools -name ohpm -type f | head -1)")/.." && pwd)"
          fi
          echo "COMMANDLINE_TOOLS=$COMMANDLINE_TOOLS" >> "$GITHUB_ENV"
          echo "OHOS_SDK_HOME=$COMMANDLINE_TOOLS/sdk" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_HOME=$COMMANDLINE_TOOLS/tool/node" >> "$GITHUB_ENV"
          echo "DEVECO_SDK_HOME=$COMMANDLINE_TOOLS/sdk" >> "$GITHUB_ENV"
          # Use GITHUB_PATH to PREPEND dirs to PATH (preserves system paths like /usr/bin)
          echo "$COMMANDLINE_TOOLS/bin" >> "$GITHUB_PATH"
          echo "$COMMANDLINE_TOOLS/hvigor/bin" >> "$GITHUB_PATH"
          echo "Extracted HarmonyOS Command Line Tools at $COMMANDLINE_TOOLS"

      - name: Configure ohpm registry
        run: |
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/ || true
          ohpm --version || true

      # ── Step 4: Decode signing materials ────────────────────────────────
      - name: Decode signing materials
        env:
          OHOS_KEYSTORE_B64: ${{ secrets.OHOS_KEYSTORE_B64 }}
          OHOS_CERT_B64: ${{ secrets.OHOS_CERT_B64 }}
          OHOS_PROFILE_B64: ${{ secrets.OHOS_PROFILE_B64 }}
        run: |
          mkdir -p signing
          if [ -z "${OHOS_KEYSTORE_B64}" ] || [ -z "${OHOS_CERT_B64}" ] || [ -z "${OHOS_PROFILE_B64}" ]; then
            echo "One or more signing material secrets are not set"
            exit 1
          fi
          echo "${OHOS_KEYSTORE_B64}" | base64 -d > signing/electerm.p12
          echo "${OHOS_CERT_B64}" | base64 -d > signing/electerm_publish.cer
          echo "${OHOS_PROFILE_B64}" | base64 -d > signing/electermRelease.p7b

          # Verify files
          for f in signing/electerm.p12 signing/electerm_publish.cer signing/electermRelease.p7b; do
            if [ ! -s "${f}" ]; then
              echo "::error::Failed to decode ${f} — check GitHub Secrets."
              exit 1
            fi
            echo "  ✓ $(basename ${f}): $(du -h ${f} | cut -f1)"
          done

      # ── Step 5: Set bundle name from secret ──────────────────────────────
      - name: Configure bundle name
        env:
          BUNDLE_NAME: ${{ secrets.OHOS_BUNDLE_NAME }}
        run: |
          if [ -n "${BUNDLE_NAME}" ]; then
            sed -i "s/\"bundleName\": \".*\"/\"bundleName\": \"${BUNDLE_NAME}\"/" \
              AppScope/app.json5
            echo "Bundle name set to: ${BUNDLE_NAME}"
          else
            echo "Using default bundle name from app.json5"
          fi
          cat AppScope/app.json5

      # ── Step 6: Build & sign the HAP ─────────────────────────────────────
      - name: Build HarmonyOS app
        run: ./scripts/build-app.sh --${{ github.event.inputs.build_mode || 'release' }}
        env:
          COMMANDLINE_TOOLS: ${{ env.COMMANDLINE_TOOLS }}
          OHOS_SDK_HOME: ${{ env.OHOS_SDK_HOME }}
          KEYSTORE_PASSWORD: ${{ secrets.OHOS_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.OHOS_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.OHOS_KEY_ALIAS }}

      - name: Debug – inspect SDK hms directory on failure
        if: failure()
        run: |
          echo "=== SDK hms directory ==="
          ls -la "$COMMANDLINE_TOOLS/sdk/default/hms/" || true
          echo ""
          echo "=== SDK hms subdirectories ==="
          find "$COMMANDLINE_TOOLS/sdk/default/hms" -maxdepth 2 -type d || true
          echo ""
          echo "=== uni-package.json files in hms ==="
          find "$COMMANDLINE_TOOLS/sdk/default/hms" -name "uni-package.json" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
          echo ""
          echo "=== oh-uni-package.json files in hms ==="
          find "$COMMANDLINE_TOOLS/sdk/default/hms" -name "oh-uni-package.json" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
          echo ""
          echo "=== sdk-pkg.json ==="
          cat "$COMMANDLINE_TOOLS/sdk/default/sdk-pkg.json" 2>/dev/null || true
          echo ""
          echo "=== Run hvigorw with --stacktrace ==="
          hvigorw assembleHap --mode module -p product=default -p buildMode=release --no-daemon --stacktrace 2>&1 || true

      # ── Step 7: Upload artifact ──────────────────────────────────────────
      - name: Find HAP file
        id: find_hap
        run: |
          HAP_FILE=$(find entry/build -name "*.hap" -type f | head -1)
          if [ -z "${HAP_FILE}" ]; then
            echo "::error::No .hap file found!"
            exit 1
          fi
          echo "hap_path=${HAP_FILE}" >> $GITHUB_OUTPUT
          echo "hap_name=$(basename ${HAP_FILE})" >> $GITHUB_OUTPUT
          echo "Found HAP: ${HAP_FILE} ($(du -h ${HAP_FILE} | cut -f1))"

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: electerm-harmony-${{ github.sha }}
          path: ${{ steps.find_hap.outputs.hap_path }}
          retention-days: 30

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch/Tag | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ohos-node | \`${{ env.OHOS_NODE_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| electerm-web | \`${{ env.ELECTERM_WEB_REPO }}@${{ env.ELECTERM_WEB_REF }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build mode | \`${{ github.event.inputs.build_mode || 'release' }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.find_hap.outputs.hap_path }}" ]; then
            echo "| HAP file | \`${{ steps.find_hap.outputs.hap_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| HAP size | \`$(du -h ${{ steps.find_hap.outputs.hap_path }} | cut -f1)\` |" >> $GITHUB_STEP_SUMMARY
          fi
